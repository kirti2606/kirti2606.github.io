<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirti — Portfolio</title>
    <meta name="description" content="Kirti · BOTT (3rd Year) · AI in Healthcare · Clinical & Research Portfolio." />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('theme')
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body class="bg-medical-white text-slate-800 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
